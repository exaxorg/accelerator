name: Run tests
on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [bookworm, alpine]
        version: [3.8, 3.12]
      fail-fast: false
    container:
      image: python:${{ matrix.version }}-${{ matrix.image }}
    steps:
      - name: Install dependencies
        run: |
          type apt && apt-get update && apt-get install -y build-essential git zlib1g-dev || true
          type apk && apk --no-cache add bash git zlib-dev build-base || true
          python3 -m pip install --break-system-packages pipx bottle
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: "repo"
      - name: Run tests
        run: |
          python3 -m pipx ensurepath
          . ~/.bashrc
          git config --global --add safe.directory $GITHUB_WORKSPACE/repo
          pipx install ./repo
          ax init project
          cd project
          ax server &
          sleep 5
          ax run tests
          trap "kill $(jobs -p)" ERR EXIT
